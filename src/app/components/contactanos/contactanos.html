<section>
  <h2>Contáctanos</h2>
  <p>¿Tienes alguna duda o sugerencia? Envíanos un mensaje.</p>


  <form [formGroup]="formularioContacto" (ngSubmit)="submit()">


    <div>
      <label for="email">Correo Electrónico:</label>
      <input
        type="email"
        id="email"
        name="email"
        formControlName="email"
        required
        placeholder="tu@email.com">
    </div>


    <div class="form-group">
      <label for="mensaje">Mensaje:</label>
      <textarea
        id="mensaje"
        name="mensaje"
        formControlName="mensaje"
        rows="5"
        required
        placeholder="Escribe aquí tu consulta..."></textarea>
    </div>


    <button type="submit" [disabled]="!formularioContacto.valid">Enviar Mensaje</button>
  </form>
</section>
